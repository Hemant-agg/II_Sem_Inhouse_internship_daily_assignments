<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Directory - Bootstrap</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
       
        .student-card {
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .student-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 15px rgba(0, 0, 0, 0.5);
            border-color: #38bdf8 !important;
        }
        .card-title {
            color: #38bdf8;
        }
    </style>
</head>
<body class="bg-dark text-light py-5">

    <div class="container">
        <h1 class="text-center mb-5" style="color: #38bdf8;">Student Directory</h1>

        <div class="row justify-content-center mb-4">
            <div class="col-md-8 col-lg-6">
                <input type="text" id="searchInput" class="form-control form-control-lg bg-dark text-light" placeholder="Search students by name...">
            </div>
        </div>

       
        <div id="directoryGrid" class="row g-4">
        
        </div>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
     
        const students = [
            { id: 1, name: "Hemant Aggarwal", major: "Computer science", email: "hemant@university.edu", status: "Junior" },
            { id: 2, name: "Hitesh Sharma", major: "Computer Science", email: "hitesh.s@university.edu", status: "Senior" },
            { id: 3, name: "Ishan Gupta", major: "AI ", email: "igupta@university.edu", status: "Sophomore" },
            { id: 4, name: "Rohan Desai", major: "Environmental Sciences", email: "rohan.d@university.edu", status: "Freshman" },
            { id: 5, name: "Ananya Singh", major: "Mathematics", email: "ananya.singh@university.edu", status: "Senior" }
        ];

        const directoryGrid = document.getElementById('directoryGrid');
        const searchInput = document.getElementById('searchInput');

       
        function renderDirectory(data) {
            directoryGrid.innerHTML = '';
            if (data.length === 0) {
                directoryGrid.innerHTML = '<div class="col-12 text-center text-muted"><p>No students found.</p></div>';
                return;
            }

            data.forEach(student => {
             
                const col = document.createElement('div');
                col.className = 'col-sm-6 col-md-4 col-lg-3';
          
                col.innerHTML = `
                    <div class="card h-100 bg-dark border-secondary student-card" data-bs-toggle="collapse" data-bs-target="#details-${student.id}" aria-expanded="false">
                        <div class="card-body">
                            <h5 class="card-title fw-bold">${student.name}</h5>
                            <h6 class="card-subtitle mb-2 text-secondary">${student.major}</h6>
                            
                            <!-- Hidden Details Section (Bootstrap Collapse) -->
                            <div class="collapse mt-3" id="details-${student.id}">
                                <div class="pt-3 border-top border-secondary">
                                    <p class="card-text mb-1 small text-light"><strong>Email:</strong> ${student.email}</p>
                                    <p class="card-text mb-1 small text-light"><strong>Year:</strong> ${student.status}</p>
                                    <p class="card-text mb-0 small text-light"><strong>ID:</strong> STU-${student.id}</p>
                                </div>
                            </div>
                        </div>
                    </div>
                `;

                directoryGrid.appendChild(col);
            });
        }

       
        searchInput.addEventListener('input', (e) => {
            const searchTerm = e.target.value.toLowerCase();
            
            const filteredStudents = students.filter(student => 
                student.name.toLowerCase().includes(searchTerm)
            );
            
            renderDirectory(filteredStudents);
        });

        renderDirectory(students);
    </script>

</body>
</html>
